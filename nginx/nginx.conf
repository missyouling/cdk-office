# CDK-Office 生产环境 Nginx 配置
# 支持负载均衡、SSL、缓存和安全优化

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 性能优化
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # 基本配置
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # 字符集
    charset utf-8;
    
    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;
    
    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # 缓冲区配置
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    client_max_body_size 200M;
    large_client_header_buffers 4 8k;
    
    # 超时配置
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Brotli 压缩（如果支持）
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # 缓存配置
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    
    # 安全头配置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # 速率限制
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    
    # 上游服务配置
    upstream cdk_office_backend {
        least_conn;
        server cdk-office-app:8000 max_fails=3 fail_timeout=30s;
        # 如果有多个应用实例，可以添加更多服务器
        # server cdk-office-app-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream stirling_pdf_backend {
        server stirling-pdf:8080 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }
    
    upstream kkfileview_backend {
        server kkfileview:8012 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }
    
    # 缓存路径
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=500m inactive=1d use_temp_path=off;
    
    # HTTP 服务器（重定向到 HTTPS）
    server {
        listen 80;
        server_name _;
        
        # Let's Encrypt 验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # 其他请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }
    
    # HTTPS 主服务器
    server {
        listen 443 ssl http2;
        server_name your-domain.com;  # 替换为实际域名
        
        # SSL 配置
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        
        # 现代 SSL 配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        
        # HSTS (可选)
        add_header Strict-Transport-Security "max-age=63072000" always;
        
        # 连接限制
        limit_conn conn_limit_per_ip 20;
        
        # 静态文件缓存
        location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html/static;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Cache-Status "STATIC";
            
            # 如果文件不存在，代理到应用
            try_files $uri @app;
        }
        
        # API 接口
        location /api/ {
            # 速率限制
            limit_req zone=api burst=20 nodelay;
            
            # 代理配置
            proxy_pass http://cdk_office_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # 超时配置
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # 缓存配置（仅对GET请求）
            location ~* ^/api/v1/(dashboard|stats|metrics) {
                proxy_cache api_cache;
                proxy_cache_valid 200 5m;
                proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
                proxy_cache_lock on;
                add_header X-Cache-Status $upstream_cache_status;
                
                proxy_pass http://cdk_office_backend;
                include /etc/nginx/proxy_params;
            }
        }
        
        # 文件上传接口
        location ~* ^/api/v1/(upload|pdf|ocr) {
            # 上传速率限制
            limit_req zone=upload burst=5 nodelay;
            
            # 大文件上传配置
            client_max_body_size 200M;
            client_body_timeout 300s;
            
            proxy_pass http://cdk_office_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 上传超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # 禁用缓存
            proxy_cache off;
            add_header X-Cache-Status "BYPASS";
        }
        
        # PDF 处理服务
        location /pdf-tools/ {
            rewrite ^/pdf-tools/(.*)$ /$1 break;
            proxy_pass http://stirling_pdf_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # PDF 处理超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
        
        # 文件预览服务
        location /preview/ {
            rewrite ^/preview/(.*)$ /$1 break;
            proxy_pass http://kkfileview_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 预览服务超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }
        
        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # 前端应用（SPA）
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ @app;
            
            # SPA 缓存策略
            location ~ ^/(static|assets)/ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            location = /index.html {
                expires 0;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }
        
        # 回退到应用服务器
        location @app {
            proxy_pass http://cdk_office_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        
        # 错误页面
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
    
    # 监控和管理服务器（内部访问）
    server {
        listen 8080;
        server_name localhost;
        
        # 仅允许内部访问
        allow 127.0.0.1;
        allow 172.20.0.0/16;  # Docker 网络
        deny all;
        
        # Nginx 状态
        location /nginx_status {
            stub_status on;
            access_log off;
        }
        
        # Prometheus 指标
        location /metrics {
            # 如果使用 nginx-prometheus-exporter
            proxy_pass http://nginx-exporter:9113/metrics;
        }
    }
}

# 包含其他配置文件
# include /etc/nginx/conf.d/*.conf;