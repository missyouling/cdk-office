# Docker Compose configuration for CDK-Office with PDF processing
version: '3.8'

services:
  # CDK-Office主应用
  cdk-office:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cdk-office
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=cdk_office
      - DB_PASSWORD=your_secure_password
      - DB_NAME=cdk_office
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STIRLING_PDF_URL=http://stirling-pdf:8080
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./pdf_results:/app/pdf_results
    depends_on:
      - postgres
      - redis
      - stirling-pdf
    restart: unless-stopped
    networks:
      - cdk-office-network

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: cdk-office-postgres
    environment:
      - POSTGRES_DB=cdk_office
      - POSTGRES_USER=cdk_office
      - POSTGRES_PASSWORD=your_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - cdk-office-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: cdk-office-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - cdk-office-network

  # Stirling PDF处理服务
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: cdk-office-stirling-pdf
    ports:
      - "8081:8080"
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - INSTALL_BOOK_AND_ADVANCED_HTML_OPS=false
      - LANGS=en_US,zh_CN
      - UI_APP_NAME=CDK-Office PDF Tools
      - UI_HOME_DESCRIPTION=PDF processing tools for CDK-Office
      - UI_APP_NAVBAR_NAME=PDF Tools
      - SYSTEM_MAXFILESIZE=100MB
      - METRICS_ENABLED=true
    volumes:
      - ./stirling-pdf/configs:/configs
      - ./stirling-pdf/logs:/logs
      - stirling_pdf_data:/usr/share/tessdata
    restart: unless-stopped
    networks:
      - cdk-office-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # KKFileView文件预览服务（可选）
  kkfileview:
    image: keking/kkfileview:latest
    container_name: cdk-office-kkfileview
    ports:
      - "8012:8012"
    environment:
      - SERVER_PORT=8012
      - FILE_UPLOAD_ENABLED=true
      - FILE_UPLOAD_SIZE_MAX=104857600  # 100MB
      - CACHE_TYPE=redis
      - CACHE_REDIS_HOST=redis
      - CACHE_REDIS_PORT=6379
    volumes:
      - ./kkfileview/files:/opt/kkFileView/files
      - ./kkfileview/logs:/opt/kkFileView/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - cdk-office-network
    profiles: ["file-preview"]  # 使用 docker-compose --profile file-preview up 启用

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: cdk-office-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./static:/usr/share/nginx/html/static
    depends_on:
      - cdk-office
    restart: unless-stopped
    networks:
      - cdk-office-network
    profiles: ["nginx"]  # 使用 docker-compose --profile nginx up 启用

  # Prometheus监控（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: cdk-office-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - cdk-office-network
    profiles: ["monitoring"]

  # Grafana仪表板（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: cdk-office-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - cdk-office-network
    profiles: ["monitoring"]

networks:
  cdk-office-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  stirling_pdf_data:
  prometheus_data:
  grafana_data: