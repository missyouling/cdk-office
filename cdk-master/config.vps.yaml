# LINUX DO CDK Config for 2C4G VPS
# Memory optimized configuration for low-resource environments

# App
app:
  app_name: "linux-do-cdk"
  env: "production" # development, testing, production
  addr: ":8000"
  session_cookie_name: "linux_do_cdk_session_id"
  session_secret: "<uniq string>"
  session_domain: ""
  session_age: 86400
  session_secure: false
  session_http_only: true
  api_prefix: "/api"

# projectApp
projectApp:
  hidden_threshold: 5
  deduction_per_offense: 5

# OAuth2
oauth2:
  client_id: "<OAUTH2_CLIENT_ID>"
  client_secret: "<OAUTH2_CLIENT_SECRET>"
  redirect_uri: "<OAUTH2_REDIRECT_URI>"
  authorization_endpoint: "https://connect.linux.do/oauth2/authorize"
  token_endpoint: "https://connect.linux.do/oauth2/token"
  user_endpoint: "https://connect.linux.do/api/user"

# DB - Memory optimized for 2C4G VPS
database:
  host: "127.0.0.1"
  port: 3306
  username: "root"
  password: ""
  database: "linux_do_cdk"
  max_idle_conn: 5     # Reduced from 10 to 5
  max_open_conn: 20    # Reduced from 100 to 20
  conn_max_lifetime: 300  # Reduced from 3600 to 300 seconds (5 minutes)
  log_level: "warn"    # Changed from info to warn to reduce log memory usage

# Redis - Memory optimized for 2C4G VPS
redis:
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
  db: 0
  pool_size: 20        # Reduced from 100 to 20
  min_idle_conn: 5     # Reduced from 10 to 5
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3

# Log - Memory optimized for 2C4G VPS
log:
  level: "warn"        # Changed from info to warn to reduce log memory usage
  format: "json"
  output: "stdout"
  file_path: "./logs/app.log"
  max_size: 50         # Reduced from 100 to 50 MB
  max_age: 7           # Reduced from 30 to 7 days
  max_backups: 3       # Reduced from 10 to 3
  compress: true

# Schedule
schedule:
  user_badge_score_dispatch_interval_seconds: 5   # Increased from 1 to 5 seconds
  update_user_badges_scores_task_cron: "0 2 * * *"
  update_all_badges_task_cron: "0 1 * * *"

# Worker - Memory optimized for 2C4G VPS
worker:
  concurrency: 10      # Reduced from 50 to 10