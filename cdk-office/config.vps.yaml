# CDK-Office Config for 2C4G VPS
# Memory optimized configuration for low-resource environments

# App
app:
  app_name: "cdk-office"
  env: "production"
  addr: ":8000"
  session_cookie_name: "cdk_office_session_id"
  session_secret: "<uniq string>"
  session_domain: ""
  session_age: 86400
  session_secure: false
  session_http_only: true
  api_prefix: "/api"

# Database - Memory optimized for 2C4G VPS
database:
  # 数据库提供商: local_postgres, supabase, memfire, neon, planetscale
  provider: "local_postgres"
  
  # 基础连接配置
  host: "127.0.0.1"
  port: 5432
  username: "postgres"
  password: ""
  database: "cdk_office"
  
  # SSL配置
  ssl_mode: "disable"     # disable, require, verify-ca, verify-full
  ssl_cert: ""            # SSL证书文件路径
  ssl_key: ""             # SSL私钥文件路径
  ssl_root_cert: ""       # SSL根证书文件路径
  
  # 连接池配置 - 内存优化
  max_idle_conn: 5        # Reduced from 10 to 5
  max_open_conn: 20       # Reduced from 100 to 20
  conn_max_lifetime: 300  # Reduced from 3600 to 300 seconds (5 minutes)
  conn_max_idle_time: 60  # 连接最大空闲时间(秒)
  
  # 日志和监控配置
  log_level: "warn"       # Changed from info to warn to reduce log memory usage
  slow_query_threshold: 500 # 慢查询阈值(毫秒)
  enable_metrics: false   # 禁用指标监控以节省内存
  
  # Supabase专用配置 - VPS优化
  supabase:
    url: "<SUPABASE_URL>"
    anon_key: "<SUPABASE_ANON_KEY>"
    service_role_key: "<SUPABASE_SERVICE_ROLE_KEY>"
    jwt_secret: "<SUPABASE_JWT_SECRET>"
    region: "us-east-1"
    api_version: "v1"
    
    # 连接配置 - VPS优化
    pooler_url: "<SUPABASE_POOLER_URL>"
    direct_url: "<SUPABASE_DIRECT_URL>"
    
    # 性能配置 - VPS内存优化
    max_connections: 5      # 进一步减少连接数
    timeout: 30
    
    # 实时数据配置
    enable_realtime: false  # 禁用实时功能以节省资源
    realtime_url: "<SUPABASE_REALTIME_URL>"
    
    # 存储配置
    storage_bucket: "cdk-office"
  
  # MemFire Cloud专用配置 - VPS优化
  memfire:
    url: "<MEMFIRE_URL>"
    api_key: "<MEMFIRE_API_KEY>"
    service_key: "<MEMFIRE_SERVICE_KEY>"
    jwt_secret: "<MEMFIRE_JWT_SECRET>"
    region: "cn-shanghai"
    api_version: "v1"
    
    # 连接配置 - VPS优化
    pooler_url: "<MEMFIRE_POOLER_URL>"
    direct_url: "<MEMFIRE_DIRECT_URL>"
    
    # 性能配置 - VPS内存优化
    max_connections: 8      # 比Supabase稍高，考虑中国网络环境
    timeout: 30
    
    # 实时功能配置
    enable_realtime: false  # 禁用实时功能以节省资源
    realtime_url: "<MEMFIRE_REALTIME_URL>"
    
    # 存储配置
    storage_bucket: "cdk-office"
    cdn_url: "<MEMFIRE_CDN_URL>"
    
    # 中国特色配置
    enable_icp: true
    custom_domain: "<CUSTOM_DOMAIN>"
    enable_https: true
  
  # 读副本数据库配置(VPS环境不建议启用)
  read_replicas: []
  
  # 多数据库支持(VPS环境不建议启用)
  enable_sharding: false

# Redis - Memory optimized for 2C4G VPS
redis:
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
  db: 0
  pool_size: 20        # Reduced from 100 to 20
  min_idle_conn: 5     # Reduced from 10 to 5
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3

# Log - Memory optimized for 2C4G VPS
log:
  level: "warn"        # Changed from info to warn to reduce log memory usage
  format: "json"
  output: "stdout"
  file_path: "./logs/app.log"
  max_size: 50         # Reduced from 100 to 50 MB
  max_age: 7           # Reduced from 30 to 7 days
  max_backups: 3       # Reduced from 10 to 3
  compress: true

# Dify AI Service
dify:
  api_key: "<DIFY_API_KEY>"
  api_endpoint: "https://api.dify.ai/v1"
  chat_endpoint: "/chat-messages"
  completion_endpoint: "/completion-messages"
  datasets_endpoint: "/datasets"
  documents_endpoint: "/documents"

# OCR Service
ocr:
  default_provider: "baidu"
  providers:
    baidu:
      api_key: "<BAIDU_OCR_API_KEY>"
      secret_key: "<BAIDU_OCR_SECRET_KEY>"
      endpoint: "https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic"
    tencent:
      secret_id: "<TENCENT_OCR_SECRET_ID>"
      secret_key: "<TENCENT_OCR_SECRET_KEY>"
      region: "ap-beijing"
      endpoint: "https://ocr.tencentcloudapi.com"

# WeChat
wechat:
  app_id: "<WECHAT_APP_ID>"
  app_secret: "<WECHAT_APP_SECRET>"
  mini_program_app_id: "<WECHAT_MINI_PROGRAM_APP_ID>"
  mini_program_secret: "<WECHAT_MINI_PROGRAM_SECRET>"

# Schedule - Memory optimized for 2C4G VPS
schedule:
  document_sync_cron: "0 0 */1 * * *"   # 每小时同步一次文档（减少频率）
  health_check_cron: "0 0 * * * *"      # 每小时检查一次服务健康状态
  archive_cron: "0 0 2 * * *"           # 每天凌晨2点执行归档任务

# Worker - Memory optimized for 2C4G VPS
worker:
  concurrency: 10      # Reduced from 50 to 10