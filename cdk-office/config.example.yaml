# CDK-Office Config
# Copy to config.yaml for runtime

# For 2C4G VPS environments, please use config.vps.yaml which contains
# memory-optimized settings to reduce resource consumption.

# App
app:
  app_name: "cdk-office"
  env: "development" # development, testing, production
  addr: ":8000"
  session_cookie_name: "cdk_office_session_id"
  session_secret: "<uniq string>"
  session_domain: ".cdk-office.example.com"
  session_age: 86400
  session_secure: false
  session_http_only: false
  api_prefix: "/api"

# Database (数据库配置)
database:
  # 数据库提供商: local_postgres, supabase, neon, planetscale
  provider: "local_postgres"
  
  # 基础连接配置
  host: "127.0.0.1"
  port: 5432
  username: "postgres"
  password: ""
  database: "cdk_office"
  
  # SSL配置
  ssl_mode: "disable"  # disable, require, verify-ca, verify-full
  ssl_cert: ""          # SSL证书文件路径
  ssl_key: ""           # SSL私钥文件路径
  ssl_root_cert: ""     # SSL根证书文件路径
  
  # 连接池配置
  max_idle_conn: 10
  max_open_conn: 100
  conn_max_lifetime: 3600   # 连接最大生命周期(秒)
  conn_max_idle_time: 300   # 连接最大空闲时间(秒)
  
  # 日志和监控配置
  log_level: "info"         # error, warn, info, debug, silent
  slow_query_threshold: 200 # 慢查询阈值(毫秒)
  enable_metrics: true      # 启用指标监控
  
  # Supabase专用配置
  supabase:
    url: "<SUPABASE_URL>"                           # Supabase项目URL
    anon_key: "<SUPABASE_ANON_KEY>"                 # 匿名密钥
    service_role_key: "<SUPABASE_SERVICE_ROLE_KEY>" # 服务角色密钥
    jwt_secret: "<SUPABASE_JWT_SECRET>"             # JWT签名密钥
    region: "us-east-1"                            # 区域
    api_version: "v1"                              # API版本
    
    # 连接配置
    pooler_url: "<SUPABASE_POOLER_URL>"             # 连接池URL(用于高并发)
    direct_url: "<SUPABASE_DIRECT_URL>"             # 直连接URL(用于迁移等)
    
    # 性能配置
    max_connections: 10                            # 最大连接数(适合免费层)
    timeout: 30                                    # 连接超时(秒)
    
    # 实时数据配置
    enable_realtime: false                        # 是否启用实时数据同步
    realtime_url: "<SUPABASE_REALTIME_URL>"         # 实时数据服务URL
    
    # 存储配置
    storage_bucket: "cdk-office"                   # 默认存储桶
  
  # MemFire Cloud专用配置（中国版Supabase）
  memfire:
    url: "<MEMFIRE_URL>"                           # MemFire项目URL
    api_key: "<MEMFIRE_API_KEY>"                   # API密钥
    service_key: "<MEMFIRE_SERVICE_KEY>"           # 服务密钥
    jwt_secret: "<MEMFIRE_JWT_SECRET>"             # JWT签名密钥
    region: "cn-shanghai"                          # 区域(默认为cn-shanghai)
    api_version: "v1"                              # API版本
    
    # 连接配置
    pooler_url: "<MEMFIRE_POOLER_URL>"             # 连接池URL(高并发场景)
    direct_url: "<MEMFIRE_DIRECT_URL>"             # 直连URL(迁移等)
    
    # 性能配置
    max_connections: 20                            # 最大连接数
    timeout: 30                                    # 连接超时(秒)
    
    # 实时功能配置
    enable_realtime: false                        # 是否启用实时数据同步
    realtime_url: "<MEMFIRE_REALTIME_URL>"         # 实时数据服务URL
    
    # 存储配置
    storage_bucket: "cdk-office"                   # 默认存储桶
    cdn_url: "<MEMFIRE_CDN_URL>"                   # CDN加速URL
    
    # 中国特色配置
    enable_icp: true                               # 是否启用ICP备案模式
    custom_domain: "<CUSTOM_DOMAIN>"               # 自定义域名
    enable_https: true                             # 强制HTTPS
  
  # 读片数据库配置(未来扩展)
  read_replicas: []
  # - name: "replica1"
  #   host: "replica1.example.com"
  #   port: 5432
  #   username: "postgres"
  #   password: "password"
  #   database: "cdk_office"
  #   ssl_mode: "require"
  #   weight: 1
  #   enabled: true
  
  # 多数据库支持(未来扩展)
  enable_sharding: false  # 是否启用分片

# Redis
redis:
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
  db: 0
  pool_size: 100
  min_idle_conn: 10
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3

# Log
log:
  level: "info"  # debug, info, warn, error, fatal, panic
  format: "json"  # text, json
  output: "stdout"  # stdout, file
  file_path: "./logs/app.log"
  max_size: 100
  max_age: 30
  max_backups: 10
  compress: true

# Dify AI Service
dify:
  api_key: "<DIFY_API_KEY>"
  api_endpoint: "https://api.dify.ai/v1"
  chat_endpoint: "/chat-messages"
  completion_endpoint: "/completion-messages"
  datasets_endpoint: "/datasets"
  documents_endpoint: "/documents"
  # 问卷分析工作流配置
  survey_analysis_workflow_id: "<SURVEY_ANALYSIS_WORKFLOW_ID>"
  knowledge_base_id: "<KNOWLEDGE_BASE_ID>"
  timeout: 30

# OCR Service
ocr:
  default_provider: "baidu"
  providers:
    baidu:
      api_key: "<BAIDU_OCR_API_KEY>"
      secret_key: "<BAIDU_OCR_SECRET_KEY>"
      endpoint: "https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic"
    tencent:
      secret_id: "<TENCENT_OCR_SECRET_ID>"
      secret_key: "<TENCENT_OCR_SECRET_KEY>"
      region: "ap-beijing"
      endpoint: "https://ocr.tencentcloudapi.com"

# WeChat
wechat:
  app_id: "<WECHAT_APP_ID>"
  app_secret: "<WECHAT_APP_SECRET>"
  mini_program_app_id: "<WECHAT_MINI_PROGRAM_APP_ID>"
  mini_program_secret: "<WECHAT_MINI_PROGRAM_SECRET>"

# Schedule
schedule:
  document_sync_cron: "0 */30 * * * *"  # 每30分钟同步一次文档
  health_check_cron: "0 0 * * * *"      # 每小时检查一次服务健康状态
  archive_cron: "0 0 2 * * *"           # 每天凌晨2点执行归档任务
  calendar_reminder_cron: "0 */15 * * * *"  # 每15分钟检查一次日程提醒

# Worker
worker:
  concurrency: 50

# Contract (电子合同配置)
contract:
  ca_provider: "mock"              # CA证书服务商: mock, fadada, esign, junziqian
  sms_provider: "mock"             # 短信服务商: mock, aliyun, tencent
  blockchain_enabled: false        # 是否启用区块链存证
  default_expire_hours: 720        # 默认过期时间(30天)
  max_signers: 10                  # 最大签署人数
  auto_archive: true               # 是否自动归档到知识库

# Survey (调查问卷配置)
survey:
  enable_public_access: true           # 是否允许公开访问问卷
  max_response_per_survey: 10000       # 每个问卷最大响应数
  default_expire_days: 90              # 默认问卷过期天数
  enable_anonymous_response: true      # 是否允许匿名响应
  auto_analysis: true                  # 是否自动触发AI分析
  export_formats: ["csv", "xlsx", "json"] # 支持的导出格式
  template_categories: ["人事管理", "市场调研", "教育培训", "服务质量"] # 模板分类

# File Storage (混合云文件存储配置)
storage:
  # 主存储策略
  primary: "local"  # cloud_db, s3, local, webdav
  
  # 云数据库存储（Supabase/MemFire）
  cloud_db:
    provider: "supabase"  # supabase, memfire
    url: "<SUPABASE_URL>"
    anon_key: "<SUPABASE_ANON_KEY>"
    service_key: "<SUPABASE_SERVICE_KEY>"
    bucket: "survey-files"
    max_file_size: "50MB"
    max_storage: "500MB"  # 免费层限制
    
  # S3兼容存储
  s3:
    providers:
      - name: "qiniu"
        access_key: "<QINIU_ACCESS_KEY>"
        secret_key: "<QINIU_SECRET_KEY>"
        bucket: "survey-files"
        endpoint: "https://s3-cn-east-1.qiniucs.com"
        region: "cn-east-1"
        use_ssl: true
      - name: "r3"
        access_key: "<R3_ACCESS_KEY>"
        secret_key: "<R3_SECRET_KEY>"
        bucket: "cdk-office-surveys"
        endpoint: "<R3_ENDPOINT>"
        use_ssl: true
        
  # 云盘存储
  cloud_drive:
    providers:
      - name: "google_drive"
        client_id: "<GOOGLE_DRIVE_CLIENT_ID>"
        client_secret: "<GOOGLE_DRIVE_CLIENT_SECRET>"
        refresh_token: "<GOOGLE_DRIVE_REFRESH_TOKEN>"
        folder_path: "/CDK-Office/Surveys"
      - name: "aliyun_drive"
        refresh_token: "<ALIYUN_DRIVE_REFRESH_TOKEN>"
        folder_path: "/CDK-Office/Surveys"
        
  # WebDAV存储
  webdav:
    url: "<WEBDAV_URL>"
    username: "<WEBDAV_USERNAME>"
    password: "<WEBDAV_PASSWORD>"
    base_path: "/surveys"
    
  # 本地存储
  local:
    path: "./storage/surveys"
    max_size: "10GB"
    base_url: "/api/files"
    
  # 全局配置
  global:
    max_file_size: "100MB"
    allowed_types: [".jpg", ".jpeg", ".png", ".gif", ".pdf", ".doc", ".docx", ".xls", ".xlsx", ".ppt", ".pptx", ".txt", ".csv"]
    enable_cleanup: true
    cleanup_days: 30

# File Storage (文件存储配置) - 保持向后兼容
file_storage:
  provider: "local"                # 存储提供商: local, oss, cos, s3
  base_path: "/api/files"          # 文件访问基础路径
  max_file_size: 100               # 最大文件大小(MB)
  
  # 本地存储配置
  local_path: "./storage"          # 本地存储目录
  
  # 阿里云OSS配置
  oss_endpoint: "<OSS_ENDPOINT>"
  oss_access_key_id: "<OSS_ACCESS_KEY_ID>"
  oss_access_key_secret: "<OSS_ACCESS_KEY_SECRET>"
  oss_bucket: "<OSS_BUCKET>"
  
  # 腾讯云COS配置
  cos_region: "<COS_REGION>"
  cos_secret_id: "<COS_SECRET_ID>"
  cos_secret_key: "<COS_SECRET_KEY>"
  cos_bucket: "<COS_BUCKET>"